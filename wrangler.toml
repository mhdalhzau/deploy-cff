name = "staff-management-system"
main = "dist/workers/index.js"
compatibility_date = "2025-01-01"
workers_dev = true
[observability.logs]
enabled = true

# Auto-build configuration for seamless deployment
[build]
command = "npm run build:workers"
cwd = "."
watch_dir = ["server", "shared", "client/src", "workers"]

# Environment variables (production ready)
[vars]
NODE_ENV = "production"
APP_NAME = "Staff Management System"
APP_VERSION = "1.0.0"

# Database binding for D1 (commented out until resources are created)
# [[d1_databases]]
# binding = "DB"
# database_name = "staff_management_db"
# database_id = "" # Run 'npm run setup' to auto-generate

# KV binding for session storage (commented out until resources are created)  
# [[kv_namespaces]]
# binding = "SESSIONS"
# id = "" # Run 'npm run setup' to auto-generate
# preview_id = "" # Run 'npm run setup' to auto-generate

# R2 binding for file storage (commented out until bucket is created)
# [[r2_buckets]]
# binding = "ASSETS"  
# bucket_name = "staff-management-assets"

# Auto-deployment environments
[env.development]
name = "staff-management-dev"
workers_dev = true
vars = { NODE_ENV = "development" }

[env.staging]
name = "staff-management-staging"
workers_dev = true
vars = { NODE_ENV = "staging" }

[env.production]
name = "staff-management-system"
workers_dev = false
vars = { NODE_ENV = "production", APP_NAME = "Staff Management System", APP_VERSION = "1.0.0" }
