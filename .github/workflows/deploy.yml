name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allow manual deployment

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build:workers
        
      - name: Setup Wrangler
        run: npm install -g wrangler
        
      - name: Create D1 database (if not exists)
        run: |
          # Check if database exists, create if not
          if ! wrangler d1 list | grep -q "staff_management_db"; then
            echo "Creating D1 database..."
            DB_OUTPUT=$(wrangler d1 create staff_management_db --json)
            DB_ID=$(echo $DB_OUTPUT | jq -r '.database_id')
            echo "Database created with ID: $DB_ID"
            echo "DB_ID=$DB_ID" >> $GITHUB_ENV
            
            # Update wrangler.toml with database ID
            sed -i "s/# database_id will be auto-generated and updated by setup script/database_id = \"$DB_ID\"/" wrangler.toml
          else
            echo "D1 database already exists"
            # Get existing database ID
            DB_ID=$(wrangler d1 list --json | jq -r '.[] | select(.name=="staff_management_db") | .uuid')
            echo "DB_ID=$DB_ID" >> $GITHUB_ENV
            sed -i "s/# database_id will be auto-generated and updated by setup script/database_id = \"$DB_ID\"/" wrangler.toml
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Create KV namespace (if not exists)
        run: |
          # Check if KV namespace exists, create if not
          if ! wrangler kv:namespace list | grep -q "SESSIONS"; then
            echo "Creating KV namespace..."
            KV_OUTPUT=$(wrangler kv:namespace create "SESSIONS" --json)
            KV_ID=$(echo $KV_OUTPUT | jq -r '.id')
            echo "KV namespace created with ID: $KV_ID"
            
            # Create preview namespace
            KV_PREVIEW_OUTPUT=$(wrangler kv:namespace create "SESSIONS" --preview --json)
            KV_PREVIEW_ID=$(echo $KV_PREVIEW_OUTPUT | jq -r '.id')
            echo "KV preview namespace created with ID: $KV_PREVIEW_ID"
            
            # Update wrangler.toml with KV IDs
            sed -i "s/# id will be auto-generated and updated by setup script/id = \"$KV_ID\"/" wrangler.toml
            sed -i "s/# preview_id will be auto-generated and updated by setup script/preview_id = \"$KV_PREVIEW_ID\"/" wrangler.toml
          else
            echo "KV namespace already exists"
            # Get existing KV namespace ID
            KV_ID=$(wrangler kv:namespace list --json | jq -r '.[] | select(.title=="staff-management-system-SESSIONS") | .id')
            sed -i "s/# id will be auto-generated and updated by setup script/id = \"$KV_ID\"/" wrangler.toml
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Setup D1 schema (if database is new)
        run: |
          # Only run if this is a new deployment or if schema doesn't exist
          TABLE_COUNT=$(wrangler d1 execute staff_management_db --command="SELECT COUNT(*) as count FROM sqlite_master WHERE type='table'" --json | jq -r '.[0].results[0].count')
          if [ "$TABLE_COUNT" -eq "0" ]; then
            echo "Setting up D1 schema..."
            wrangler d1 execute staff_management_db --file=migrations/d1/schema.sql
            
            # Import data if available
            if [ -f "migrations/d1/data-import.sql" ]; then
              echo "Importing initial data..."
              wrangler d1 execute staff_management_db --file=migrations/d1/data-import.sql
            fi
          else
            echo "D1 schema already exists, skipping setup"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Deploy to Cloudflare Workers
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "Deploying to production..."
            wrangler deploy --env production
          else
            echo "Deploying to staging..."
            wrangler deploy --env staging
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Test deployment
        run: |
          # Wait a moment for deployment to propagate
          sleep 10
          
          # Test health endpoint
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; then
            WORKER_URL="https://staff-management-prod.workers.dev"
          else
            WORKER_URL="https://staff-management-staging.workers.dev"
          fi
          
          echo "Testing deployment at: $WORKER_URL"
          curl -f "$WORKER_URL/api/health" || echo "Health check failed, but deployment completed"
          
      - name: Commit updated wrangler.toml (if changed)
        run: |
          if [ -n "$(git status --porcelain wrangler.toml)" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add wrangler.toml
            git commit -m "Auto-update wrangler.toml with resource IDs [skip ci]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}